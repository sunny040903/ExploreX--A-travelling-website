<!DOCTYPE html>
<html>

<head>
    <title>ExploreX - Register</title>
    <link rel="icon" type="image/png" href="LogoX.png" />
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        h2 {
            text-align: center;
        }
        
        input,
        select {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background: #1e3c72;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>ExploreX Register</h2>

        <input id="name" placeholder="Full Name">
        <input id="email" type="email" placeholder="Email">
        <input id="phone" placeholder="Phone Number">

        <select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

        <input id="userid" placeholder="Create User ID">
        <input id="password" type="password" placeholder="Create Password">

        <button onclick="register()">Register</button>
    </div>

    <script>
        function register() {

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let gender = document.getElementById("gender").value;
            let userid = document.getElementById("userid").value.trim();
            let password = document.getElementById("password").value.trim();

            if (!name || !email || !phone || !gender || !userid || !password) {
                alert("Please fill all fields");
                return;
            }

            let users = JSON.parse(localStorage.getItem("explorex_users")) || [];

            let userExists = users.find(user => user.userid === userid);

            if (userExists) {
                alert("User ID already exists!");
                return;
            }

            users.push({
                name,
                email,
                phone,
                gender,
                userid,
                password
            });

            localStorage.setItem("explorex_users", JSON.stringify(users));

            alert("Registration Successful!");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
