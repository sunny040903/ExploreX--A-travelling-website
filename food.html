<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Food &amp; Party Booking</title>
    <link rel="stylesheet" href="cruise.css">
    <link rel="icon" type="image/png" href="LogoX.png" />
</head>

<body>

    <h2>🍽 Food & Party Packages</h2>

    <div class="box">
        <label>Select Food Package</label>
        <select id="food">
        <option value="Veg Buffet">Veg Buffet – ₹3,000</option>
        <option value="Non-Veg Buffet">Non-Veg Buffet – ₹4,500</option>
        <option value="Seafood Special">Seafood Special – ₹6,000</option>
        <option value="Luxury Dining">Luxury Dining – ₹8,000</option>
    </select>

        <label>Select Party Package</label>
        <select id="party">
        <option value="No Party">No Party – ₹0</option>
        <option value="DJ Night">DJ Night – ₹2,500</option>
        <option value="International DJ">International DJ – ₹5,000</option>
        <option value="VIP Party Deck">VIP Party Deck – ₹10,000</option>
    </select>

        <button onclick="saveFood()">Continue to Payment</button>
    </div>

    <script src="cruise.js"></script>
</body>

</html>
