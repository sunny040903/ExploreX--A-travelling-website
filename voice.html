<!DOCTYPE html>
<html>

<head>
    <title>Travel AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="LogoX.png" />
    <link rel="icon" type="image/png" href="ExploreX.png" />
</head>

<body>

    <div class="chat-container">
        <h1>🌍 Travel AI Voice Assistant</h1>

        <div id="chatBox" class="chat-box"></div>

        <div class="controls">
            <input type="text" id="userInput" placeholder="Ask about travel...">
            <button onclick="sendMessage()">Send</button>
            <button onclick="startListening()">🎤 Speak</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
