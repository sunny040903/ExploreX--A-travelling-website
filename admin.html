<!DOCTYPE html>
<html>

<head>
    <title>ExploreX Admin</title>
    <link rel="icon" type="image/png" href="LogoX.png" />
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 90%;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        th {
            background: #2a5298;
            color: white;
            padding: 10px;
        }
        
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
        
        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .count {
            font-weight: bold;
            margin-top: 10px;
        }
        
        .admin-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background: linear-gradient(45deg, red, gold);
            color: white;
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: "Trebuchet MS", "Comic Sans MS", cursive;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        
        .admin-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <a href="dashboard.html">
        <button class="admin-btn">Admin Dashboard</button>
    </a>
    <script>
        let pass = prompt("Enter Admin Password:");
        if (pass !== "admin123") {
            alert("Wrong Password!");
            window.location.href = "login.html";
        }
    </script>

    <h2>ExploreX Admin Dashboard</h2>
    <p class="count">Total Registered Users: <span id="count"></span></p>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Gender</th>
                <th>User ID</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="userdata"></tbody>
    </table>

    <script>
        let users = JSON.parse(localStorage.getItem("explorex_users")) || [];

        document.getElementById("count").innerText = users.length;

        function loadUsers() {
            let table = document.getElementById("userdata");
            table.innerHTML = "";

            users.forEach((user, index) => {
                table.innerHTML += `
<tr>
<td>${user.name}</td>
<td>${user.email}</td>
<td>${user.phone}</td>
<td>${user.gender}</td>
<td>${user.userid}</td>
<td><button class="delete-btn" onclick="deleteUser(${index})">Delete</button></td>
</tr>
`;
            });
        }

        function deleteUser(index) {
            users.splice(index, 1);
            localStorage.setItem("explorex_users", JSON.stringify(users));
            location.reload();
        }

        loadUsers();
    </script>

</body>

</html>
